name: Redshift MVP

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL server, client, and AWS CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql postgresql-client awscli

      - name: Expose PostgreSQL server binaries on PATH
        run: |
          PG_BIN=$(ls -d /usr/lib/postgresql/*/bin 2>/dev/null | head -1)
          if [ -z "$PG_BIN" ]; then
            echo "no /usr/lib/postgresql/*/bin found" >&2
            exit 1
          fi
          echo "$PG_BIN" >> "$GITHUB_PATH"
          echo "Using PostgreSQL bindir: $PG_BIN"
          "$PG_BIN/postgres" --version
          "$PG_BIN/initdb" --version

      - name: Run tests
        run: go test ./...

      - name: Run Redshift MVP acceptance gate
        run: VERIFY_STAGE=full bash scripts/redshift-autoloop/verify.sh

      - name: Run Redshift E2E
        run: scripts/redshift-e2e.sh
